<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Fondo circular -->
  <circle cx="50" cy="50" r="48" fill="#0a1628" stroke="#f39c12" stroke-width="2"/>
  
  <!-- Onda sinusoidal (representa energía ondulatoria) -->
  <path d="M 10 60 
           Q 20 30, 30 60 
           Q 40 90, 50 60 
           Q 60 30, 70 60 
           Q 80 90, 90 60" 
        stroke="#f39c12" 
        stroke-width="4" 
        fill="none" 
        stroke-linecap="round"/>
  
  <!-- Flecha de dirección (indica propagación) -->
  <polygon points="85,55 95,60 85,65" fill="#f39c12"/>
  <line x1="10" y1="60" x2="85" y2="60" stroke="#f39c12" stroke-width="2" stroke-dasharray="4,4"/>
  
  <!-- Partículas vibrando (opcional) -->
  <circle cx="20" cy="55" r="3" fill="#f39c12" opacity="0.7"/>
  <circle cx="40" cy="45" r="3" fill="#f39c12" opacity="0.7"/>
  <circle cx="60" cy="75" r="3" fill="#f39c12" opacity="0.7"/>
  <circle cx="80" cy="55" r="3" fill="#f39c12" opacity="0.7"/>
</svg>